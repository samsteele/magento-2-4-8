name: Build and Push on Tag

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/magento2-phpfpm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write auth.json
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: printenv COMPOSER_AUTH > auth.json

      - name: Debug auth.json
        run: |
          echo "File size: $(wc -c < auth.json) bytes"
          echo "Valid JSON: $(python3 -m json.tool auth.json > /dev/null 2>&1 && echo yes || echo no)"
          echo "Has repo.magento.com: $(python3 -c "import json; d=json.load(open('auth.json')); print('yes' if 'repo.magento.com' in d.get('http-basic',{}) else 'no')")"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            id=composer_auth,src=auth.json

      - name: Remove auth.json
        run: rm auth.json