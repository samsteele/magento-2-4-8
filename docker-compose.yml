services:
  phpfpm:
    build:
      context: .
      secrets:
        - composer_auth
    container_name: magento2-phpfpm
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mariadb
      - valkey
      - opensearch
    networks:
      - magento

  nginx:
    image: nginx:alpine
    container_name: magento2-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - phpfpm
    networks:
      - magento

  mariadb:
    image: mariadb:11.4
    container_name: magento2-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: magento2
      MYSQL_USER: magento2
      MYSQL_PASSWORD: magento2
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - magento

  valkey:
    image: valkey/valkey:8-alpine
    container_name: magento2-valkey
    networks:
      - magento

  opensearch:
    image: opensearchproject/opensearch:3
    container_name: magento2-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - magento

volumes:
  mariadb_data:
  opensearch_data:

networks:
  magento:
    driver: bridge

secrets:
  composer_auth:
    file: ./auth.json
